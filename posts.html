---
layout: default
title: Tianyi Cai | Posts
---
<div class='container bg-main'>
  <h1> {{ page.title }} </h1>
  <hr> {% for post in site.posts %}
  <h2 class='post-title'>
    <a href='{{ post.url }}'>{{ post.title }}</a>
  </h2>
  <div class='post-header'>
    <i>{{ post.excerpt }}</i>
    <span class='post-date'>{{ post.date | date: '%Y-%m-%d' }}</span>
  </div>
  <br>
  {% endfor %}
</div>
